apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
spec:
  project: default
  sources:
    # Ingress
    - repoURL: "https://vmware-tanzu.github.io/helm-charts"
      targetRevision: "12.0.2"
      chart: velero
      helm:
        releaseName: velero
        valueFiles:
          - $values/kubernetes/backups/velero/values.yaml
    # Values Ref
    - repoURL: "https://github.com/McMumf/homelab"
      targetRevision: "main"
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: velero
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
