type: postgresql
mode: standalone

fullnameOverride: "n8n-cnpg"

version:
  postgresql: "18"

cluster:
  instances: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  storage:
    size: 8Gi
    storageClass: openebs

  walStorage:
    storageClass: openebs
    size: 8Gi

  postgresql:
    parameters:
      log_hostname: "off"
      log_timezone: "UTC"
      max_connections: "200"
      shared_buffers: "256MB"

  roles:
    - name: n8n
      ensure: present
      comment: n8n User
      login: true
      superuser: true
      inRoles:
        - pg_monitor
        - pg_signal_backend

  initdb:
    database: n8n
    owner: n8n
    encoding: UTF8

backup:
  volumeSnapshot:
    className: csi-openebs-snapshotclass
