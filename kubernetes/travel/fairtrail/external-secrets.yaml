apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: fairtrail-secrets
  namespace: travel
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: apps-secret-store
    kind: ClusterSecretStore
  target:
    name: fairtrail-secrets
  data:
    - secretKey: admin-password
      remoteRef:
        key: apps/fairtrail
        property: admin-password

    - secretKey: admin-session-secret
      remoteRef:
        key: apps/fairtrail
        property: admin-session-secret

    - secretKey: cron-secret
      remoteRef:
        key: apps/fairtrail
        property: cron-secret
