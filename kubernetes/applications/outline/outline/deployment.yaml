apiVersion: apps/v1
kind: Deployment
metadata:
  name: outline
  namespace: outline
  labels:
    app.kubernetes.io/name: outline
    app.kubernetes.io/instance: outline
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: "25%"
      maxUnavailable: "25%"
  selector:
    matchLabels:
      app.kubernetes.io/name: outline
      app.kubernetes.io/instance: outline
  template:
    metadata:
      labels:
        app.kubernetes.io/name: outline
        app.kubernetes.io/instance: outline
    spec:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: "OnRootMismatch"
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: outline-svc-acct
      containers:
        - name: outline
          image: outlinewiki/outline:1.5.0
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            privileged: false
            runAsUser: 1001
            runAsGroup: 1001
          ports:
            - name: http
              containerPort: 3000
          livenessProbe:
            httpGet:
              path: /_health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /_health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 5
          resources:
            limits:
              cpu: 2000m
              ephemeral-storage: 8Gi
              memory: 4Gi
            requests:
              cpu: 500m
              ephemeral-storage: 8Gi
              memory: 1Gi
          env:
            - name: NODE_ENV
              value: production
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: outline-secrets
                  key: secret-key
            - name: UTILS_SECRET
              valueFrom:
                secretKeyRef:
                  name: outline-secrets
                  key: utils-secret
            - name: PORT
              value: "3000"
            - name: DEFAULT_LANGUAGE
              value: "en_US"
            - name: URL
              value: "https://notes.mcmumf.dev"
            - name: TELEMETRY
              value: "false"
            - name: FORCE_HTTPS
              value: "false" # handled elsewhere
            - name: WEB_CONCURRENCY
              value: "1"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: outline-cnpg-app
                  key: uri
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: outline-secrets
                  key: smtp-server
            - name: SMTP_PORT
              value: "587"
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: outline-secrets
                  key: smtp-username
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: outline-secrets
                  key: smtp-token
            - name: SMTP_FROM_EMAIL
              value: "homelab@mcmumf.dev"
            - name: SMTP_REPLY_EMAIL
              value: "homelab@mcmumf.dev"
            - name: FILE_STORAGE_UPLOAD_MAX_SIZE
              value: "26214400"
            - name: FILE_STORAGE
              value: "local"
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: outline-secrets
                  key: oidc-client
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: outline-secrets
                  key: oidc-secret
            - name: OIDC_AUTH_URI
              value: "https://auth.mcmumf.dev/application/o/authorize/"
            - name: OIDC_TOKEN_URI
              value: "https://auth.mcmumf.dev/application/o/token/"
            - name: OIDC_USERINFO_URI
              value: "https://auth.mcmumf.dev/application/o/userinfo/"
            - name: OIDC_LOGOUT_URI
              value: "https://auth.mcmumf.dev/application/o/outline/end-session/"
            - name: OIDC_USERNAME_CLAIM
              value: "preferred_username"
            - name: OIDC_DISPLAY_NAME
              value: "authentik"
            - name: OIDC_SCOPES
              value: "openid profile email"
            - name: REDIS_URL
              value: "redis://outline-redis-headless:6379"
          volumeMounts:
            - name: outline-data
              mountPath: /var/lib/outline/data
      initContainers:
        - name: init-redis
          image: busybox:1.28
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
          command:
            [
              "sh",
              "-c",
              "until nslookup outline-redis-headless.outline; do echo waiting for outline-redis-headless; sleep 2; done",
            ]
        - name: init-db
          image: busybox:1.28
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
          command:
            [
              "sh",
              "-c",
              "until nslookup outline-cnpg-rw.outline; do echo waiting for outline-cnpg-app; sleep 2; done",
            ]
      volumes:
        - name: outline-data
          persistentVolumeClaim:
            claimName: outline-data
