apiVersion: v1
kind: Service
metadata:
  name: outline-redis
  namespace: outline
  labels:
    app.kubernetes.io/name: outline-redis
    app.kubernetes.io/instance: outline-redis
spec:
  type: ClusterIP
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: 6379
  selector:
    app.kubernetes.io/name: outline-redis
    app.kubernetes.io/instance: outline-redis
