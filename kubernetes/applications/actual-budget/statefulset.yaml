apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: actual-server
  namespace: actualbudget
spec:
  serviceName: "actual-server"
  replicas: 1
  selector:
    matchLabels:
      app: actual-server
  template:
    metadata:
      labels:
        app: actual-server
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: "OnRootMismatch"
      containers:
        # Container
        - name: actual-server
          image: docker.io/actualbudget/actual-server:26.3.0-alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            privileged: false
            runAsUser: 1001
            runAsGroup: 1001
          # Resources
          resources:
            requests:
              cpu: 1000m
              memory: 1Gi
              ephemeral-storage: 8Gi
            limits:
              cpu: 2000m
              memory: 1Gi
              ephemeral-storage: 8Gi
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          # Ports
          ports:
            - name: http
              containerPort: 5006
              protocol: TCP
          env:
            - name: ACTUAL_PORT
              value: "5006"
            - name: ACTUAL_DATA_DIR
              value: "/data"
            - name: ACTUAL_SERVER_FILES
              value: "/data/server-files"
            - name: ACTUAL_USER_FILES
              value: "/data/user-files"
            - name: ACTUAL_UPLOAD_FILE_SYNC_SIZE_LIMIT_MB
              value: "20"
            - name: ACTUAL_UPLOAD_SYNC_ENCRYPTED_FILE_SYNC_SIZE_LIMIT_MB
              value: "50"
            - name: ACTUAL_UPLOAD_FILE_SIZE_LIMIT_MB
              value: "20"
            - name: ACTUAL_OPENID_DISCOVERY_URL
              value: "https://auth.mcmumf.dev/application/o/actual-budget/.well-known/openid-configuration"
            - name: ACTUAL_OPENID_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: actual-budget-secrets
                  key: client-id
            - name: ACTUAL_OPENID_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: actual-budget-secrets
                  key: client-secret
            - name: ACTUAL_OPENID_SERVER_HOSTNAME
              value: "https://actual.mcmumf.dev"
            - name: ACTUAL_TOKEN_EXPIRATION
              value: "openid-provider"
          # Volume Mounts
          volumeMounts:
            - name: actual-server-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: actual-server-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "openebs"
        resources:
          requests:
            storage: 8Gi
