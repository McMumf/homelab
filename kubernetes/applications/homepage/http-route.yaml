apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homepage-http-route
  namespace: apps
  labels:
    app.kubernetes.io/name: homepage
spec:
  parentRefs:
    - name: internal-gateway
      namespace: kube-system
  hostnames:
    - "homepage.mcmumf.dev"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: homepage
          port: 3000
