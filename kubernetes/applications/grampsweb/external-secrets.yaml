apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grampsweb-secrets
  namespace: gramps
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: apps-secret-store
    kind: ClusterSecretStore
  target:
    name: grampsweb-secrets
  data:
    - secretKey: secret-key
      remoteRef:
        key: apps/grampsweb
        property: secret-key
