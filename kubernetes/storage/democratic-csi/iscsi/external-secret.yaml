apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: democratic-csi-iscsi-secret
  namespace: democratic-csi
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: infra-secret-store
    kind: ClusterSecretStore
  target:
    name: truenas-iscsi-driver-config
  data:
    - secretKey: driver-config-file.yaml
      remoteRef:
        key: infra/democratic-csi
        property: iscsi-driver-config
