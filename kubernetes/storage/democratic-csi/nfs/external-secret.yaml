apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: democratic-csi-nfs-secret
  namespace: democratic-csi
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: infra-secret-store
    kind: ClusterSecretStore
  target:
    name: truenas-nfs-driver-config
  data:
    - secretKey: driver-config-file.yaml
      remoteRef:
        key: infra/democratic-csi
        property: nfs-driver-config
